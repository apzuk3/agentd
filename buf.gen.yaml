version: v2
clean: true
plugins:
  - local: protoc-gen-go
    out: gen/proto/go
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: gen/proto/go
    opt:
      - paths=source_relative
      - simple
  - remote: buf.build/bufbuild/es
    out: gen/proto/ts
    opt: target=ts
  - remote: buf.build/connectrpc/es
    out: gen/proto/ts/connect
    opt: target=ts
