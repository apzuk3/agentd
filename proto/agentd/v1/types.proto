syntax = "proto3";

package agentd.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/apzuk3/agentd/gen/proto/go/agentd/v1;agentdv1";

enum ErrorCode {
    ERROR_CODE_UNSPECIFIED = 0;
    ERROR_CODE_INTERNAL = 1;
    ERROR_CODE_INVALID_AGENT_TREE = 2;
    ERROR_CODE_RATE_LIMITED = 3;
    ERROR_CODE_AUTH_FAILED = 4;
    ERROR_CODE_SESSION_NOT_FOUND = 5;
    ERROR_CODE_MODEL_UNAVAILABLE = 6;
    ERROR_CODE_TIMEOUT = 7;
}

message Tool {
    // Must comply with Gemini function naming: start with a letter or underscore,
    // only [a-zA-Z0-9_.\-:], max 64 characters.
    string name = 1 [(buf.validate.field).string = {
        pattern: "^[A-Za-z_][A-Za-z0-9_.:-]{0,63}$",
        min_len: 1,
        max_len: 64
    }];
    string description = 2 [(buf.validate.field).string.min_len = 1];
    optional string input_schema = 3;
}

message Agent {
    string name = 1;
    string description = 2;

    oneof agent_type {
        LlmAgent llm = 3;
        SequentialAgent sequential = 4;
        ParallelAgent parallel = 5;
        LoopAgent loop = 6;
    }
}

message McpAttachment {
    // MCP server name to attach (matches client MCPServerConfig.Name).
    string mcp_name = 1;
    // Optional subset of discovered MCP tools to attach for this agent.
    // Empty means attach all discovered tools from mcp_name.
    repeated string include_tool_names = 2;
}

message LlmAgent {
    string model = 1;
    repeated string tool_names = 2;
    repeated Agent sub_agents = 3;
    string instruction = 4;
    repeated string builtin_tools = 5;
    string output_key = 6;
    // MCP server names to attach to this agent (matches client MCPServerConfig.Name).
    // For each listed MCP, all discovered tools from that MCP are appended to tool_names.
    repeated string mcp_names = 7;
    // Per-agent MCP attachments with optional include filters.
    repeated McpAttachment mcp_attachments = 8;
}

message SequentialAgent {
    repeated Agent agents = 1;
}

message ParallelAgent {
    repeated Agent agents = 1;
}

message LoopAgent {
    repeated Agent agents = 1;
    uint32 max_iterations = 2; // server hard cap; 0 = server default
}

// TokenUsage holds per-event or cumulative token counts.
message TokenUsage {
    int32 prompt_tokens = 1;      // input tokens
    int32 completion_tokens = 2;  // output tokens
    int32 cached_tokens = 3;
    int32 thoughts_tokens = 4;
    int32 total_tokens = 5;
}

// UsageSummary is the final billing summary for a session.
message UsageSummary {
    TokenUsage total_usage = 1;   // accumulated across all LLM calls
    int32 llm_calls = 2;         // number of LLM round-trips
    double estimated_cost = 3;   // dollar cost using provider rates
}
