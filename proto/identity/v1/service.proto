syntax = "proto3";

package identity.v1;

option go_package = "github.com/syss-io/executor/gen/proto/go/identity/v1;identityv1";

import "domain/v1/types.proto";

service Identity {
    rpc CreateAPIKey (CreateAPIKeyRequest) returns (CreateAPIKeyResponse);
    rpc ListAPIKeys (ListAPIKeysRequest) returns (ListAPIKeysResponse);
    rpc RemoveAPIKey (RemoveAPIKeyRequest) returns (RemoveAPIKeyResponse);
}

message CreateAPIKeyRequest {
    string name = 1;
}

message CreateAPIKeyResponse {
    domain.v1.APIKey api_key = 1;
    string plain_key = 2; // The unhashed key, only returned on creation
}

message ListAPIKeysRequest {}

message ListAPIKeysResponse {
    repeated domain.v1.APIKey api_keys = 1;
}

message RemoveAPIKeyRequest {
    int64 key_id = 1;
}

message RemoveAPIKeyResponse {}
