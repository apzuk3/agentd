syntax = "proto3";

package executor.v1;

option go_package = "github.com/syss-io/executor/gen/proto/go/executor/v1;executorv1";

import "google/protobuf/empty.proto";
import "domain/v1/types.proto";

service Executor {
    rpc AgentSession (stream StartSessionRequest) returns (stream StartSessionResponse);
}

message StartSessionRequest {
    // Agent and Tool definitions (sent during handshake from electron → brain)
    message Agent {
        message Tool {
            string name = 1;
            string description = 2;
            // JSON Schema encoded as JSON string (can be unmarshalled into jsonschema)
            string input_schema = 3;
            string output_schema = 4;
            int32 timeout_ms = 5;
        }

        string name = 1;
        string description = 2;
        string instruction = 3;
        repeated Tool tools = 4;
        domain.v1.Model model = 5;
        repeated Agent sub_agents = 6;
    }

    message RunRequest {
        enum Workflow {
            WORKFLOW_UNSPECIFIED = 0;
            WORKFLOW_SEQUENTIAL = 1;
            WORKFLOW_LOOP = 2;
            WORKFLOW_PARALLEL = 3;
        }

        Workflow workflow = 1;
        string instruction = 2;
        repeated Agent agents = 3;
        string user_message = 4;
        domain.v1.Model model = 5;
        int32 max_iterations = 6;
        double budget = 7;  // Maximum allowed session cost in USD (0 = unlimited)
    }

    // Response to brain's tool call request
    message ToolCallResponse {
        string request_id = 1;            // Correlates to AgentSessionResponse.ToolCallRequest.request_id
        
        enum Status {
            STATUS_UNSPECIFIED = 0;
            STATUS_SUCCESS = 1;
            STATUS_ERROR = 2;
            STATUS_TIMEOUT = 3;
        }
        Status status = 2;
        
        // JSON-encoded output matching tool's output_schema (populated on success)
        string output = 3;
        
        // Error message (populated on failure)
        string error = 4;
        
        // Execution time in milliseconds (for monitoring/debugging)
        int64 execution_time_ms = 5;
    }

    // Heartbeat to keep connection alive
    message Heartbeat {
        int64 timestamp = 1;
    }

    // Graceful session termination
    message SessionEnd {
        string reason = 1; // e.g., "user_requested", "error", "timeout"
    }

    oneof message {
        RunRequest run_request = 1;
        ToolCallResponse tool_call_response = 2;
        Heartbeat heartbeat = 3;
        SessionEnd session_end = 4;
    }
}

message StartSessionResponse {
    // Session-level error (e.g., invalid tool requested, session error)
    message Error {
        string code = 1;    // e.g., "TOOL_NOT_FOUND", "SESSION_ERROR", "INVALID_INPUT"
        string message = 2;
        map<string, string> details = 3;
    }

    // Heartbeat acknowledgment
    message HeartbeatAck {
        int64 timestamp = 1;
    }

    // Session end acknowledgment
    message SessionEndAck {
        bool acknowledged = 1;
    }

    message SessionEnd {
        enum Reason {
            REASON_UNSPECIFIED = 0;
            REASON_BUDGET = 1;
            REASON_TIMEOUT = 2;
        }
        Reason reason = 1;
        string message = 2;  // Human-readable message (e.g., "Budget exceeded: $0.05 > $0.04")
    }

    message ToolCallRequest {
        string request_id = 1;
        string agent_name = 2;
        string tool_name = 3;
        string input = 4;
    }

    // Individual usage entry for tracking per-agent/tool consumption
    message UsageEntry {
        string agent_name = 1;           // Name of the agent that generated this usage
        string model = 2;                // Model used (e.g., "gemini-2.5-pro")
        int32 input_tokens = 3;          // Input tokens for this entry
        int32 output_tokens = 4;         // Output tokens for this entry
        double input_cost = 5;           // Input cost in USD for this entry
        double output_cost = 6;          // Output cost in USD for this entry
        int64 timestamp_ms = 7;          // Timestamp in milliseconds when this was recorded
    }

    // Response with generated content from the agent
    message RunResponse {
        string content = 1;
        // Cumulative totals
        int32 input_token_count = 2;
        int32 output_token_count = 3;
        double input_cost = 4;
        double output_cost = 5;
        double total_cost = 6;
    }

    oneof message {
        RunResponse run_response = 1;
        ToolCallRequest tool_call_request = 2;
        Error error = 3;
        HeartbeatAck heartbeat_ack = 4;
        SessionEndAck session_end_ack = 5;
        SessionEnd session_end = 6;
    }
}