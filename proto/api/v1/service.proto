syntax = "proto3";

package api.v1;

option go_package = "github.com/syss-io/executor/gen/proto/go/api/v1;apiv1";

import "google/protobuf/empty.proto";
import "domain/v1/types.proto";

service API {
    rpc CreateAPIKey (CreateAPIKeyRequest) returns (CreateAPIKeyResponse);
    rpc MintToken (MintTokenRequest) returns (MintTokenResponse);
}

message CreateAPIKeyRequest {
    
}

message CreateAPIKeyResponse {
    string api_key = 1;
}

message MintTokenRequest {
    int32 duration_minutes = 1;
    optional int32 allowed_budget = 2;
    repeated domain.v1.Model allowed_models = 3;
    optional string allowed_service = 4;
}

message MintTokenResponse {
    string token = 1;
}