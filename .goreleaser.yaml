version: 2

project_name: agentd

before:
  hooks:
    - go mod tidy

builds:
  - id: agentd
    main: ./cmd/main.go
    binary: agentd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

dockers:
  - image_templates:
      - "ghcr.io/apzuk3/agentd:{{ .Tag }}-amd64"
      - "ghcr.io/apzuk3/agentd:v{{ .Major }}.{{ .Minor }}-amd64"
      - "ghcr.io/apzuk3/agentd:latest-amd64"
    use: buildx
    goarch: amd64
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
    dockerfile: Dockerfile

  - image_templates:
      - "ghcr.io/apzuk3/agentd:{{ .Tag }}-arm64"
      - "ghcr.io/apzuk3/agentd:v{{ .Major }}.{{ .Minor }}-arm64"
      - "ghcr.io/apzuk3/agentd:latest-arm64"
    use: buildx
    goarch: arm64
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
    dockerfile: Dockerfile

docker_manifests:
  - name_template: "ghcr.io/apzuk3/agentd:{{ .Tag }}"
    image_templates:
      - "ghcr.io/apzuk3/agentd:{{ .Tag }}-amd64"
      - "ghcr.io/apzuk3/agentd:{{ .Tag }}-arm64"

  - name_template: "ghcr.io/apzuk3/agentd:v{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/apzuk3/agentd:v{{ .Major }}.{{ .Minor }}-amd64"
      - "ghcr.io/apzuk3/agentd:v{{ .Major }}.{{ .Minor }}-arm64"

  - name_template: "ghcr.io/apzuk3/agentd:latest"
    image_templates:
      - "ghcr.io/apzuk3/agentd:latest-amd64"
      - "ghcr.io/apzuk3/agentd:latest-arm64"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
